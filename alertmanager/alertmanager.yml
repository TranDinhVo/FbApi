global:
  resolve_timeout: 5m
  # Read URL from temp file generated by entrypoint script from env variable
  slack_api_url_file: '/tmp/slack_url'

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'slack_notifications'

receivers:
  - name: 'slack_notifications'
    slack_configs:
      - channel: '#alerts' # Replace with your Slack channel name
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        text: >-
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Details:* {{ .Annotations.description }}
            *Severity:* `{{ .Labels.severity }}`
            *Time:* {{ .StartsAt }}
          {{ end }}
