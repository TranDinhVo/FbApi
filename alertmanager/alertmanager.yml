global:
  resolve_timeout: 5m
  # Đọc URL từ file tạm do script tự sinh ra từ biến môi trường
  slack_api_url_file: '/tmp/slack_url'

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'slack_notifications'

receivers:
  - name: 'slack_notifications'
    slack_configs:
      - channel: '#alerts' # Thay bằng tên channel của bạn
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        text: >-
          {{ range .Alerts }}
            *Cảnh báo:* {{ .Annotations.summary }}
            *Chi tiết:* {{ .Annotations.description }}
            *Mức độ:* `{{ .Labels.severity }}`
            *Thời gian:* {{ .StartsAt }}
          {{ end }}
