
services:
  # -- Hạ tầng Kafka --
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: fb_api-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fb_api-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # -- Tạo sẵn Topic cho Kafka --
  init-kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fb_api-init-kafka
    depends_on:
      - kafka
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "
      echo -e 'Waiting for Kafka to be ready...'
      cub kafka-ready -b kafka:29092 1 30

      echo -e 'Creating kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic raw_events      --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic reply_commands  --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic send_failed     --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic send_retry      --replication-factor 1 --partitions 3
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dead_letter     --replication-factor 1 --partitions 1

      echo -e 'Successfully created the following topics:'
      kafka-topics --bootstrap-server kafka:29092 --list
      "

  # -- Kafka UI --
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fb_api-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: fb_api-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: fb_api-kafka-exporter
    depends_on:
      - kafka
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=kafka:29092"

  # -- Prometheus --
  prometheus:
    image: prom/prometheus:latest
    container_name: fb_api-prometheus
    depends_on:
      - kafka-exporter
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  # -- Alertmanager --
  alertmanager:
    image: prom/alertmanager:latest
    container_name: fb_api-alertmanager
    depends_on:
      - prometheus
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    env_file:
      - .env
    entrypoint:
      - /bin/sh
      - -c
      - "echo $$SLACK_WEBHOOK_URL > /tmp/slack_url && /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml"

  # -- PostgreSQL --
  postgres:
    image: postgres:16
    container_name: fb_api-postgres
    environment:
      POSTGRES_DB: fb_api_db
      POSTGRES_USER: fb_api_user
      POSTGRES_PASSWORD: fb_api_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # -- Microservices --
  webhook-service:
    image: node:20-alpine
    container_name: fb_api-webhook-service
    working_dir: /app
    volumes:
      - ./services/webhook-service:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - KAFKA_BROKERS=kafka:29092
      - PORT=3001
      - KAFKA_CLIENT_ID=webhook-service
    depends_on:
      init-kafka:
        condition: service_completed_successfully

  core-service:
    image: node:20-alpine
    container_name: fb_api-core-service
    working_dir: /app
    volumes:
      - ./services/core-service:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_GROUP_ID=core-service-group
    depends_on:
      init-kafka:
        condition: service_completed_successfully

  backend-api:
    image: node:20-alpine
    container_name: fb_api-backend-api
    working_dir: /app
    volumes:
      - ./services/backend-api:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_GROUP_ID=backend-api-group
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=fb_api_db
      - DB_USER=fb_api_user
      - DB_PASSWORD=fb_api_password
    depends_on:
      init-kafka:
        condition: service_completed_successfully
      postgres:
        condition: service_started

  retry-service:
    image: node:20-alpine
    container_name: fb_api-retry-service
    working_dir: /app
    volumes:
      - ./services/retry-service:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "3003:3003"
    env_file:
      - .env
    environment:
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_GROUP_ID=retry-service-group
    depends_on:
      init-kafka:
        condition: service_completed_successfully

volumes:
  postgres_data:
  prometheus_data:
